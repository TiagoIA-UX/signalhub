nichos:
  lex_portugal:
    nome: "Direitos do Consumidor"
    emoji: "🇵🇹"
    marca: "Direitos do Consumidor"
    dominio: "direitosconsumidor.com"
    cta_link: "https://www.direitosconsumidor.com"
    cta_texto: "Solicitar relatório reservado em direitosconsumidor.com"
    empresa:
      titular: "Tiago Aureliano da Rocha"
      forma: "MEI"
      cnpj: "61.699.939/0001-80"
      atuacao: "Especialistas em pesquisa jurídica documental"
      email_privacidade: "privacidade@direitosconsumidor.com"
    legal_pt:
      lei_base: "Lei n.º 24/96, de 31 de julho (Defesa do Consumidor)"
      consulta_advogado_eur: 48
      instrucao_deteccao: >
        O scoring já indicou o setor (grupo). Na R2 use SEMPRE o prazo e a nota desse setor.
        Se o post mencionar outro setor, adapte com prudência e não invente prazos — em dúvida,
        cite a regra geral de 15 dias úteis (Livro de Reclamações) e diga que o relatório
        confirma o enquadramento específico.
      geral:
        prazo_resposta: "15 dias úteis"
        base_prazo: "Decreto-Lei n.º 156/2005 e DL n.º 74/2017 (Livro de Reclamações)"
      setores:
        pt_telecom:
          prazo: "15 dias úteis"
          regulatorio: "ANACOM"
          nota_prazo: >
            Telecomunicações: no Livro de Reclamações mantém 15 dias úteis, com resposta escrita
            e cópia à ANACOM. Pode ainda contactar a ANACOM (800 206 665). Fidelização e preços
            regem-se também pela Lei das Comunicações Eletrónicas — não confundir com prazos de
            portabilidade (ex. 1 dia útil), que são outro procedimento.
        pt_logistica:
          prazo: "15 dias úteis"
          regulatorio: "Entidade do setor (ex. CTT / retalho)"
          nota_prazo: >
            Entregas e extravio: prazo geral de 15 dias úteis à reclamação no Livro de Reclamações;
            litígios podem seguir para mediação/arbitragem de consumo (ex. CICAP).
        pt_reembolso:
          prazo: "15 dias úteis"
          nota_prazo: >
            Reembolso ou devolução: 15 dias úteis após reclamação formal; direito de livre
            resolução em contratos à distância pode implicar 14 dias noutras fases — adaptar ao post.
        pt_habitacao:
          prazo: "15 dias úteis"
          nota_prazo: >
            Arrendamento e habitação: prazo geral de 15 dias úteis na reclamação ao fornecedor;
            matérias complexas podem exigir relatório Completo e apoio de advogado.
        pt_saude_estetica:
          prazo: "15 dias úteis"
          nota_prazo: >
            Clínicas e ginásios: 15 dias úteis na resposta à reclamação; contratos de prestação
            de serviços seguem Lei 24/96 — verificar cláusulas de cancelamento no relatório.
      nota_fontes: >
        Não mencionar DGSI, bases de dados, portais nem metodologia antes do pagamento.
      glossario_pt_pt:
        - "você → si / tratar por «a sua situação»"
        - "contato → contacto"
        - "aplicativo → aplicação"
        - "celular → telemóvel"
        - "procon / cdc / reclame aqui → remover (não existe em PT)"
        - "até → até (ok); usar «no máximo»"
        - "reais / R$ → euros / €"
        - "carteira → conta / IBAN"
        - "jurídico → jurídico (ok); evitar «advogada» genérica BR"
      roteiro_obrigatorio: |
        R1: Olá + empatia. R2: Lei 24/96 + prazo do SETOR + nota setorial se houver;
        se prazo expirado → advogado ~€48 + ROI sem fontes. R3: marca, preço plano, link site.
    score_minimo: 7
    precos:
      moeda: "EUR"
      essencial: 29
      padrao: 39
      completo: 59
      nota: "RGPD · valor acordado por escrito."
      tagline: "Cada situação é analisada com atenção individual."
    grupos:
      pt_telecom:
        nome: "Telecom — fidelização / cancelamento"
        peso: 9
        plano_sugerido: padrao
        roi_referencia: >
          penalizações pedidas entre €250–€600; reduções ou anulações frequentes entre €120–€380.
        keywords:
          - "fidelização"
          - "fidelizacao"
          - "cancelar contrato"
          - "meo"
          - "nos"
          - "vodafone"
          - "digi"
          - "aumento de preço"
          - "anacom"
      pt_logistica:
        nome: "Logística — CTT / entrega"
        peso: 8
        plano_sugerido: essencial
        roi_referencia: >
          reembolsos entre €40–€150; indemnizações simbólicas de €25–€75 em atrasos longos.
        keywords:
          - "ctt"
          - "não chegou"
          - "nao chegou"
          - "extravio"
          - "encomenda"
          - "worten"
      pt_reembolso:
        nome: "Reembolso / devolução recusada"
        peso: 8
        plano_sugerido: essencial
        roi_referencia: acordos entre €59–€299 após reclamação formal.
        keywords:
          - "reembolso"
          - "devolução"
          - "devolucao"
          - "recusa"
      pt_habitacao:
        nome: "Habitação / arrendamento"
        peso: 7
        plano_sugerido: completo
        roi_referencia: devoluções entre €80–€400 em mediação.
        keywords:
          - "arrendamento"
          - "senhorio"
          - "ihru"
      pt_saude_estetica:
        nome: "Clínica / ginásio — cancelamento"
        peso: 7
        plano_sugerido: completo
        roi_referencia: devolução entre €80–€400 em decisões analisadas.
        keywords:
          - "clínica"
          - "estética"
          - "ginásio"

