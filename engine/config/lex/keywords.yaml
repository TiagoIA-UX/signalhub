          - "negativa de cobertura"
          - "plano negou cirurgia"
          - "plano de saúde recusou"
          - "reembolso negado plano"

      G6_telecom:
        nome: "Telecom — internet / celular"
        peso: 7
        keywords:
          - "internet caindo"
          - "velocidade abaixo do contratado"
          - "portabilidade bloqueada"

      G7_conta_banco:
        nome: "Conta bloqueada / banco digital"
        peso: 8
        keywords:
          - "conta bloqueada"
          - "bloquearam minha conta"
          - "pix bloqueado"
          - "conta suspensa"

      G8_lgpd_dados:
        nome: "LGPD / vazamento de dados"
        peso: 8
