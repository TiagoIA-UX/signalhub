          - "vale a pena procon"
          - "quanto tempo tenho para reclamar"
          - "antes de contratar advogado"
          - "alguém já passou por isso"
          - "meus direitos como consumidor"

      G10_ecommerce:
        nome: "E-commerce — entrega / reembolso"
        peso: 8
        keywords:
          - "produto não chegou"
          - "não reembolsaram"
          - "produto diferente do anúncio"

