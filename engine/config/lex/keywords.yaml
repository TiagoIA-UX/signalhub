# LexBot — Keywords CDC (Lex Rocha)

nichos:
  lex_rocha:
    nome: "Lex Rocha — Consultoria CDC"
    emoji: "⚖️"
    cta_link: "https://lexrocha.com.br"
    cta_texto: "Pesquisa de precedentes — material informativo"
    score_minimo: 7

    grupos:
      G1_produto_defeito:
        nome: "Produto com defeito / vício oculto"
        peso: 9
        keywords:
          - "produto com defeito"
          - "30 dias para consertar"
          - "vício oculto"
          - "produto parou de funcionar"
          - "garantia negada"
          - "não quiseram trocar"
          - "assistência técnica negou"
          - "produto chegou quebrado"

      G2_arrependimento:
        nome: "Direito de arrependimento (7 dias)"
        peso: 8
        keywords:
          - "direito de arrependimento"
          - "7 dias para devolver"
          - "não aceitaram devolução"
          - "arrependimento de compra"
          - "como devolver compra online"

      G3_cobranca_indevida:
        nome: "Cobrança indevida / abusiva"
        peso: 9
        keywords:
          - "cobrança indevida"
          - "me cobraram duas vezes"
          - "cobrança após cancelamento"
          - "débito não autorizado"
          - "estorno não caiu"

      G4_assinatura_cancelamento:
        nome: "Assinatura que não cancela"
        peso: 8
