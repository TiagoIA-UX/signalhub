# Dorks Lex Rocha — varredura web (adicione quantos quiser)

meta:
  tenant: lex_rocha
  max_results_por_dork: 8
  delay_segundos_entre_dorks: 3

# Fontes ativas: duckduckgo, reddit, hackernews, rss
fontes:
  - duckduckgo
  - reddit
  - hackernews

reddit:
  subreddits:
    - brasil
    - consumidor
    - brasilivre
    - direito
  limit: 15

hackernews:
  queries:
    - consumer rights brazil
    - LGPD

rss:
  feeds: []
  # Exemplo Google Alerts (cole URL do alerta quando criar):
  # - https://www.google.com/alerts/feeds/XXXXX/XXXXX

dorks:
  - id: lex_r_reddit_cdc
    query: 'site:reddit.com/r/brasil OR site:reddit.com/r/consumidor ("produto com defeito" OR "cobrança indevida" OR "conta bloqueada" OR "procon")'
  - id: lex_reclameaqui
    query: 'site:reclameaqui.com.br ("não resolveram" OR "cobrança indevida" OR "produto defeituoso" OR "cancelamento")'
  - id: lex_jusbrasil
    query: 'site:jusbrasil.com.br ("dano moral" OR "vício do produto" OR "CDC" consumidor)'
  - id: lex_forum_consumidor
    query: 'inurl:forum ("reclamação" OR "meus direitos" OR "procon") (empresa OR operadora OR banco) 2025..2026'
  - id: lex_lgpd
    query: '("vazamento de dados" OR "LGPD" OR "conta bloqueada") (Brasil OR consumidor)'
  - id: lex_plano_saude
    query: '("negativa de cobertura" OR "plano de saúde negou") Brasil'
  - id: lex_cancelamento
    query: '("assinatura que não cancela" OR "não consigo cancelar" OR "cobrança após cancelamento")'
  - id: lex_quora_yahoo
    query: 'site:quora.com OR site:answers.yahoo.com consumidor direitos Brasil'
