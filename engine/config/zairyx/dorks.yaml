# Dorks Zairyx — varredura web delivery

meta:
  tenant: zairyx
  max_results_por_dork: 8
  delay_segundos_entre_dorks: 3

fontes:
  - duckduckgo
  - reddit
  - hackernews

reddit:
  subreddits:
    - restaurantes
    - empreendedorismo
    - brasil
    - smallbusiness
  limit: 15

hackernews:
  queries:
    - food delivery restaurant

rss:
  feeds: []

dorks:
  - id: zai_ifood_comissao
    query: '("comissão ifood" OR "taxa ifood alta" OR "ifood come minha margem") (delivery OR restaurante)'
  - id: zai_reddit_delivery
    query: 'site:reddit.com/r/restaurantes OR site:reddit.com/r/empreendedorismo ("ifood" OR "canal próprio" OR "cardápio digital")'
  - id: zai_entregador_proprio
    query: '("entregador próprio" OR "motoboy próprio") (delivery OR pizzaria OR restaurante)'
  - id: zai_google_meu_negocio
    query: '("google meu negócio" OR "cadastrar google maps") (restaurante OR delivery)'
  - id: zai_trafego_pago
    query: '("tráfego pago" OR "google ads") (restaurante OR delivery) dúvida'
  - id: zai_whatsapp_pedido
    query: '("pedido direto whatsapp" OR "canal próprio whatsapp") delivery'
  - id: zai_sair_ifood
    query: '("sair do ifood" OR "alternativa ao ifood" OR "sem marketplace") restaurante'
